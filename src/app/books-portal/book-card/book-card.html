@let titleId = `title-${book().isbn}`;


<article class="book-card">
  <img alt="Buchcover"
       [src]="book().imageUrl"
       [aria-describedby]="titleId" ]/>
  <header>
    <h2>{{ book().title }}</h2>
  </header>
  <div>
    @if (book().subtitle!=null){
      <p role="doc-subtitle">{{ book().subtitle }}</p>
    }
    ISBN: {{ book().isbn| isbnFormat}}
  </div>
  <!-- Hier werden die Bücher angezeigt -->
  <footer>
    <a [routerLink]="['details', book().isbn]">Details</a>
    <button type="button" class="secondary"
            (click)="likeBook()">Like</button>
  </footer>
</article>
