<section>
  <h1>Favorite Books</h1>
  <ul>
    @for (b of likedBooks(); track b.isbn){
      <li>{{ b.title }} ({{ b.isbn }})</li>
    } @empty {
      <li>No books liked.</li>
    }
    <button type="button" (click)="clearLikedBooks()">
      Clear
    </button>
  </ul>
</section>

<section>
  <h1>Books</h1>
  <input type="search"
         [value]="searchTerm()"
         (input)="searchTerm.set($event.target.value)"
         placeholder="Search"
         aria-label="Search" />
  <div>
    @for (b of filteredBooks();track b.isbn){
      <app-book-card [book]="b"
      (like)="addLikedBook($event)"/>
    }
  </div>
</section>
